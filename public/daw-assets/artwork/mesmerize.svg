<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="50%" stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>

    <!-- Main large sphere (purple-blue) -->
    <radialGradient id="sphere1" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="25%" stop-color="#8b5cf6"/>
      <stop offset="55%" stop-color="#6d28d9"/>
      <stop offset="80%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#1e1065"/>
    </radialGradient>

    <!-- Highlight on main sphere -->
    <radialGradient id="sphere1-highlight" cx="35%" cy="30%" r="30%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Medium sphere (pink-magenta) -->
    <radialGradient id="sphere2" cx="45%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="30%" stop-color="#ec4899"/>
      <stop offset="60%" stop-color="#be185d"/>
      <stop offset="100%" stop-color="#831843"/>
    </radialGradient>

    <!-- Highlight on pink sphere -->
    <radialGradient id="sphere2-highlight" cx="40%" cy="30%" r="28%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Small sphere (blue-cyan) -->
    <radialGradient id="sphere3" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="30%" stop-color="#06b6d4"/>
      <stop offset="60%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#164e63"/>
    </radialGradient>

    <!-- Highlight on blue sphere -->
    <radialGradient id="sphere3-highlight" cx="38%" cy="28%" r="25%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <!-- Tiny sphere (warm amber) -->
    <radialGradient id="sphere4" cx="42%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="35%" stop-color="#f59e0b"/>
      <stop offset="65%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </radialGradient>

    <!-- Ambient glow -->
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(139,92,246,0.3)"/>
      <stop offset="100%" stop-color="rgba(139,92,246,0)"/>
    </radialGradient>

    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(236,72,153,0.2)"/>
      <stop offset="100%" stop-color="rgba(236,72,153,0)"/>
    </radialGradient>

    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(6,182,212,0.15)"/>
      <stop offset="100%" stop-color="rgba(6,182,212,0)"/>
    </radialGradient>

    <!-- Noise filter for texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>

    <!-- Soft shadow -->
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Bloom glow filter -->
    <filter id="bloom">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur"/>
      <feComponentTransfer in="blur" result="brightBlur">
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="brightBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Ambient glow layers -->
  <ellipse cx="220" cy="230" rx="180" ry="160" fill="url(#glow1)"/>
  <ellipse cx="330" cy="280" rx="140" ry="130" fill="url(#glow2)"/>
  <ellipse cx="170" cy="350" rx="120" ry="100" fill="url(#glow3)"/>

  <!-- Light rays / streaks -->
  <line x1="120" y1="100" x2="400" y2="350" stroke="rgba(139,92,246,0.06)" stroke-width="60"/>
  <line x1="80" y1="200" x2="430" y2="300" stroke="rgba(236,72,153,0.04)" stroke-width="40"/>

  <!-- Main large sphere (purple) -->
  <g filter="url(#shadow)">
    <circle cx="240" cy="220" r="120" fill="url(#sphere1)"/>
    <circle cx="240" cy="220" r="120" fill="url(#sphere1-highlight)"/>
    <!-- Rim light -->
    <ellipse cx="290" cy="170" rx="40" ry="15" fill="rgba(167,139,250,0.15)" transform="rotate(-30 290 170)"/>
  </g>

  <!-- Medium sphere (pink) — partially behind main -->
  <g filter="url(#shadow)">
    <circle cx="340" cy="270" r="80" fill="url(#sphere2)"/>
    <circle cx="340" cy="270" r="80" fill="url(#sphere2-highlight)"/>
    <ellipse cx="370" cy="240" rx="25" ry="10" fill="rgba(244,114,182,0.15)" transform="rotate(-25 370 240)"/>
  </g>

  <!-- Small sphere (teal-cyan) -->
  <g filter="url(#shadow)">
    <circle cx="160" cy="330" r="55" fill="url(#sphere3)"/>
    <circle cx="160" cy="330" r="55" fill="url(#sphere3-highlight)"/>
    <ellipse cx="180" cy="310" rx="18" ry="7" fill="rgba(103,232,249,0.15)" transform="rotate(-20 180 310)"/>
  </g>

  <!-- Tiny sphere (amber) -->
  <g filter="url(#shadow)">
    <circle cx="310" cy="380" r="35" fill="url(#sphere4)"/>
    <ellipse cx="325" cy="368" rx="12" ry="5" fill="rgba(251,191,36,0.2)" transform="rotate(-15 325 368)"/>
  </g>

  <!-- Extra tiny decorative spheres -->
  <circle cx="400" cy="160" r="15" fill="url(#sphere3)" opacity="0.6"/>
  <circle cx="400" cy="160" r="15" fill="url(#sphere3-highlight)" opacity="0.6"/>

  <circle cx="130" cy="160" r="12" fill="url(#sphere2)" opacity="0.5"/>
  <circle cx="130" cy="160" r="12" fill="url(#sphere2-highlight)" opacity="0.5"/>

  <circle cx="380" cy="400" r="10" fill="url(#sphere1)" opacity="0.4"/>

  <circle cx="90" cy="260" r="8" fill="url(#sphere4)" opacity="0.4"/>

  <!-- Floating particles / bokeh -->
  <circle cx="100" cy="120" r="3" fill="rgba(167,139,250,0.6)"/>
  <circle cx="420" cy="200" r="2" fill="rgba(244,114,182,0.5)"/>
  <circle cx="350" cy="130" r="2.5" fill="rgba(103,232,249,0.5)"/>
  <circle cx="200" cy="420" r="3" fill="rgba(139,92,246,0.4)"/>
  <circle cx="450" cy="350" r="2" fill="rgba(251,191,36,0.5)"/>
  <circle cx="70" cy="380" r="2.5" fill="rgba(236,72,153,0.4)"/>
  <circle cx="280" cy="100" r="1.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="430" cy="440" r="2" fill="rgba(139,92,246,0.3)"/>

  <!-- Subtle noise overlay for texture -->
  <rect width="512" height="512" filter="url(#noise)" opacity="0.3"/>
</svg>
